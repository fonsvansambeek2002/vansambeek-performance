<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Beheer · Van Sambeek Performance</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>

  <div id="app" class="hidden">
    <header class="app-topbar">
      <div class="brand">
        <img src="assets/logo.png" alt="" />
        <span>Content beheer</span>
      </div>
      <button class="icon-btn" id="logoutBtn" title="Uitloggen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </header>

    <main class="app-main" style="padding-bottom: 40px;">
      <div class="tabs" id="viewTabs" style="margin-bottom: 16px; overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none;">
        <button class="tab active" data-view="content" style="flex-shrink:0;">Content</button>
        <button class="tab" data-view="reflecties" style="flex-shrink:0;">Wedstrijdreflecties</button>
        <button class="tab" data-view="checkins" style="flex-shrink:0;">Check-ins</button>
        <button class="tab" data-view="opdrachten" style="flex-shrink:0;">Opdrachten</button>
        <button class="tab" data-view="planning" style="flex-shrink:0;">Planning</button>
        <button class="tab" data-view="video" style="flex-shrink:0;">Video Analyse</button>
      </div>

      <div id="view-content">
        <div class="tabs" id="categoryTabs">
          <button class="tab active" data-category="mentaal">Mentaal</button>
          <button class="tab" data-category="mindfulness">Mindfulness</button>
          <button class="tab" data-category="voeding">Voeding</button>
          <button class="tab" data-category="fysiek">Fysiek</button>
        </div>

        <div class="card">
          <h3 id="formTitle">Nieuwe content toevoegen</h3>
          <form id="contentForm">
            <div class="field">
              <label>Categorie</label>
              <select id="contentCategory">
                <option value="mentaal">Mentaal</option>
                <option value="mindfulness">Mindfulness</option>
                <option value="voeding">Voeding</option>
                <option value="fysiek">Fysiek</option>
              </select>
            </div>
            <div class="field">
              <label>Titel (NL)</label>
              <input id="contentTitle" required />
            </div>
            <div class="field">
              <label>Inhoud (NL)</label>
              <textarea id="contentBody" style="min-height: 100px;"></textarea>
            </div>
            <div class="field" style="border-left:3px solid #3b82f6;padding-left:12px;">
              <label style="color:#3b82f6;">Titel (EN)</label>
              <input id="contentTitleEn" placeholder="English title" />
            </div>
            <div class="field" style="border-left:3px solid #3b82f6;padding-left:12px;">
              <label style="color:#3b82f6;">Inhoud (EN)</label>
              <textarea id="contentBodyEn" style="min-height:100px;" placeholder="English description / body"></textarea>
            </div>
            <div class="field">
              <label>Media URL (optioneel)</label>
              <input id="contentMediaUrl" type="url" placeholder="https://..." />
            </div>
            <div class="field">
              <label>Gepubliceerd</label>
              <select id="contentPublished">
                <option value="true">Ja</option>
                <option value="false">Nee</option>
              </select>
            </div>
            <div class="field">
              <label>Sorteervolgorde</label>
              <input id="contentSortOrder" type="number" value="0" step="1" />
            </div>
            <button type="submit" class="btn btn-accent btn-block" id="contentSubmitBtn">Toevoegen</button>
            <button type="button" class="btn btn-ghost btn-block hidden" id="cancelEditBtn" style="margin-top: 8px;">Annuleren</button>
            <p id="contentMessage" class="hidden"></p>
          </form>
        </div>

        <h3 style="margin: 24px 0 12px;">Bestaande content — <span id="listCategoryLabel">Mentaal</span></h3>
        <div id="contentListAdmin"></div>
      </div>

      <div id="view-reflecties" class="hidden">
        <h3 style="margin: 0 0 16px;">Wedstrijdreflecties per atleet</h3>
        <div id="reflectiesOverview"></div>
      </div>

      <div id="view-checkins" class="hidden">
        <h3 style="margin: 0 0 16px;">Wekelijkse check-ins per atleet</h3>
        <div id="checkinsOverview"></div>
      </div>

      <div id="view-opdrachten" class="hidden">
        <h3 style="margin: 0 0 16px;">Opdrachten per atleet</h3>
        <div id="opdrachtenOverview"></div>
      </div>

      <div id="view-planning" class="hidden">
        <h3 style="margin: 0 0 16px;">Toernooiplanning per atleet</h3>
        <div id="planningOverview"></div>
      </div>

      <div id="view-video" class="hidden">
        <h3 style="margin: 0 0 16px;">Video analyse — ingediende video's</h3>
        <div id="videoOverview"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script>
    let currentUser = null;
    let activeCategory = 'mentaal';
    let currentItems = [];
    let editingId = null;

    document.getElementById('logoutBtn').addEventListener('click', logout);

    async function logout() {
      await supabaseClient.auth.signOut();
      location.href = 'login.html';
    }

    const ALL_VIEWS = ['content', 'reflecties', 'checkins', 'opdrachten', 'planning', 'video'];

    document.querySelectorAll('#viewTabs .tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#viewTabs .tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        const view = tab.dataset.view;
        ALL_VIEWS.forEach((v) => document.getElementById('view-' + v).classList.toggle('hidden', v !== view));
        if (view === 'reflecties') loadReflectiesOverview();
        if (view === 'checkins') loadCheckinsOverview();
        if (view === 'opdrachten') loadOpdrachtenOverview();
        if (view === 'planning') loadPlanningOverview();
        if (view === 'video') loadVideoOverview();
      });
    });

    document.querySelectorAll('#categoryTabs .tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        cancelEdit();
        document.querySelectorAll('#categoryTabs .tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        activeCategory = tab.dataset.category;
        document.getElementById('contentCategory').value = activeCategory;
        document.getElementById('listCategoryLabel').textContent = tab.textContent;
        loadContentList();
      });
    });

    document.getElementById('contentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById('contentMessage');
      const payload = {
        title: document.getElementById('contentTitle').value.trim(),
        description: document.getElementById('contentBody').value.trim(),
        title_en: document.getElementById('contentTitleEn').value.trim() || null,
        description_en: document.getElementById('contentBodyEn').value.trim() || null,
        category: document.getElementById('contentCategory').value,
        video_url: document.getElementById('contentMediaUrl').value.trim() || null,
        published: document.getElementById('contentPublished').value === 'true',
        sort_order: Number(document.getElementById('contentSortOrder').value) || 0,
      };

      const { error } = editingId
        ? await supabaseClient.from('content_items').update(payload).eq('id', editingId)
        : await supabaseClient.from('content_items').insert(payload);

      messageEl.classList.remove('hidden', 'error-msg', 'success-msg');

      if (error) {
        messageEl.classList.add('error-msg');
        messageEl.textContent = 'Opslaan mislukt: ' + error.message;
        return;
      }

      messageEl.classList.add('success-msg');
      messageEl.textContent = editingId ? 'Content bijgewerkt.' : 'Content toegevoegd.';
      cancelEdit();
      loadContentList();
    });

    document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);

    function startEdit(item) {
      editingId = item.id;
      document.getElementById('contentCategory').value = item.category;
      document.getElementById('contentTitle').value = item.title;
      document.getElementById('contentBody').value = item.description || '';
      document.getElementById('contentTitleEn').value = item.title_en || '';
      document.getElementById('contentBodyEn').value = item.description_en || '';
      document.getElementById('contentMediaUrl').value = item.video_url || '';
      document.getElementById('contentPublished').value = item.published ? 'true' : 'false';
      document.getElementById('contentSortOrder').value = item.sort_order ?? 0;
      document.getElementById('formTitle').textContent = 'Content bewerken';
      document.getElementById('contentSubmitBtn').textContent = 'Bijwerken';
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      document.getElementById('contentForm').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      editingId = null;
      document.getElementById('contentForm').reset();
      document.getElementById('contentCategory').value = activeCategory;
      document.getElementById('formTitle').textContent = 'Nieuwe content toevoegen';
      document.getElementById('contentSubmitBtn').textContent = 'Toevoegen';
      document.getElementById('cancelEditBtn').classList.add('hidden');
    }

    async function checkAccess() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      currentUser = user;
      const { data: profile } = await supabaseClient.from('profiles').select('is_admin').eq('id', user.id).single();

      if (!profile || !profile.is_admin) {
        location.href = 'portal.html';
        return;
      }

      document.getElementById('app').classList.remove('hidden');
      loadContentList();
    }

    async function loadContentList() {
      const list = document.getElementById('contentListAdmin');
      list.innerHTML = `<div class="empty-state">Laden…</div>`;

      const { data, error } = await supabaseClient
        .from('content_items')
        .select('*')
        .eq('category', activeCategory)
        .order('created_at', { ascending: false });

      if (error || !data || !data.length) {
        currentItems = [];
        list.innerHTML = `<div class="empty-state">Nog geen content in deze categorie.</div>`;
        return;
      }

      currentItems = data;

      list.innerHTML = data.map((item) => `
        <div class="content-item">
          <strong>${escapeHtml(item.title)}</strong>
          <p class="muted" style="margin-top:6px;">${escapeHtml(item.description || '')}</p>
          <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button class="btn btn-ghost edit-btn" data-id="${item.id}" style="padding: 8px 16px; font-size: 12px;">Bewerken</button>
            <button class="btn btn-ghost delete-btn" data-id="${item.id}" style="padding: 8px 16px; font-size: 12px; color: var(--danger);">Verwijderen</button>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.edit-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const item = currentItems.find((i) => i.id === btn.dataset.id);
          if (item) startEdit(item);
        });
      });

      list.querySelectorAll('.delete-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (!confirm('Deze content verwijderen?')) return;
          await supabaseClient.from('content_items').delete().eq('id', btn.dataset.id);
          if (editingId === btn.dataset.id) cancelEdit();
          loadContentList();
        });
      });
    }

    async function loadReflectiesOverview() {
      const overview = document.getElementById('reflectiesOverview');
      overview.innerHTML = '<div class="empty-state">Laden…</div>';

      const [{ data: reflections, error: rErr }, { data: profiles, error: pErr }] = await Promise.all([
        supabaseClient.from('match_reflections').select('*').order('datum', { ascending: false }),
        supabaseClient.from('profiles').select('id, full_name'),
      ]);

      if (rErr || pErr || !reflections) {
        overview.innerHTML = '<div class="empty-state">Kon reflecties niet laden.</div>';
        return;
      }

      if (!reflections.length) {
        overview.innerHTML = '<div class="empty-state">Nog geen wedstrijdreflecties ingevoerd.</div>';
        return;
      }

      const profileMap = {};
      (profiles || []).forEach((p) => { profileMap[p.id] = p.full_name || p.id; });

      const grouped = {};
      reflections.forEach((r) => {
        if (!grouped[r.user_id]) grouped[r.user_id] = [];
        grouped[r.user_id].push(r);
      });

      overview.innerHTML = Object.entries(grouped).map(([userId, recs]) => `
        <div class="card" style="margin-bottom: 16px;">
          <h3 style="margin-bottom: 12px;">${escapeHtml(profileMap[userId] || userId)}</h3>
          ${recs.map((r) => `
            <div class="content-item" style="margin-bottom: 12px;">
              <strong>${escapeHtml(r.tegenstander)}</strong>
              <span class="muted"> · ${escapeHtml(r.datum)}${r.score ? ' · ' + escapeHtml(r.score) : ''}</span>
              <p class="muted" style="margin-top:8px;"><strong>Wat ging goed:</strong> ${escapeHtml(r.vraag1)}</p>
              <p class="muted" style="margin-top:4px;"><strong>Verbeteren:</strong> ${escapeHtml(r.vraag2)}</p>
              <p class="muted" style="margin-top:4px;"><strong>Aanpak:</strong> ${escapeHtml(r.vraag3)}</p>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function loadCheckinsOverview() {
      const overview = document.getElementById('checkinsOverview');
      overview.innerHTML = '<div class="empty-state">Laden…</div>';

      function getWeekStart() {
        const d = new Date();
        const day = d.getDay();
        d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
        return d.toISOString().split('T')[0];
      }

      const thisWeek = getWeekStart();
      const weekLabel = new Date(thisWeek + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });

      const [{ data: checkins, error: cErr }, { data: profiles, error: pErr }] = await Promise.all([
        supabaseClient.from('weekly_checkins').select('*').order('week_start', { ascending: false }),
        supabaseClient.from('profiles').select('id, full_name, is_admin'),
      ]);

      if (cErr || pErr) {
        overview.innerHTML = '<div class="empty-state">Kon check-ins niet laden.</div>';
        return;
      }

      const athletes = (profiles || []).filter((p) => !p.is_admin);
      const profileMap = {};
      (profiles || []).forEach((p) => { profileMap[p.id] = p.full_name || p.id; });

      const grouped = {};
      (checkins || []).forEach((c) => {
        if (!grouped[c.user_id]) grouped[c.user_id] = [];
        grouped[c.user_id].push(c);
      });

      if (!athletes.length && !Object.keys(grouped).length) {
        overview.innerHTML = '<div class="empty-state">Nog geen check-ins ingediend.</div>';
        return;
      }

      function ciCard(c, name, showName) {
        return `
          <div class="card" style="border-left:3px solid #C8F135;">
            ${showName ? `<h3 style="margin-bottom:10px;">${escapeHtml(name)}</h3>` : ''}
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;">
              ${adminRating('Overall', c.overall_rating)}
              ${adminRating('Ment. T', c.mental_training)}
              ${adminRating('Ment. W', c.mental_matches)}
              ${adminRating('Energie', c.energy_level)}
              ${adminRating('Slaap', c.sleep_recovery)}
            </div>
            <div style="font-size:0.75rem;color:#555;margin-bottom:6px;">${c.training_sessions ?? 0} trainingen</div>
            ${c.went_well ? `<p style="margin-top:6px;font-size:0.82rem;color:#888;line-height:1.5;"><span style="color:#666;font-weight:600;">Goed: </span>${escapeHtml(c.went_well)}</p>` : ''}
            ${c.was_challenging ? `<p style="margin-top:4px;font-size:0.82rem;color:#888;line-height:1.5;"><span style="color:#666;font-weight:600;">Uitdagend: </span>${escapeHtml(c.was_challenging)}</p>` : ''}
            ${c.focus_next_week ? `<p style="margin-top:4px;font-size:0.82rem;color:#888;line-height:1.5;"><span style="color:#666;font-weight:600;">Focus: </span>${escapeHtml(c.focus_next_week)}</p>` : ''}
          </div>
        `;
      }

      // ── DEZE WEEK ─────────────────────────────────────────
      let html = `<p style="font-size:0.75rem;color:#555;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin:0 0 12px;">Deze week — ${weekLabel}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px;">`;

      // Show all known athletes (submitted or not)
      const shownThisWeek = new Set();
      athletes.forEach((athlete) => {
        const ci = (grouped[athlete.id] || []).find((c) => c.week_start === thisWeek);
        shownThisWeek.add(athlete.id);
        if (ci) {
          html += ciCard(ci, athlete.full_name || athlete.id, true);
        } else {
          html += `
            <div class="card" style="border-left:3px solid #1E1E1E;opacity:.5;">
              <h3 style="margin-bottom:6px;">${escapeHtml(athlete.full_name || athlete.id)}</h3>
              <p style="font-size:0.82rem;color:#555;">Nog niet ingediend</p>
            </div>`;
        }
      });

      // Any check-in from users not in profiles list
      Object.entries(grouped).forEach(([userId, recs]) => {
        if (shownThisWeek.has(userId)) return;
        const ci = recs.find((c) => c.week_start === thisWeek);
        if (ci) html += ciCard(ci, profileMap[userId] || userId, true);
      });

      html += `</div>`;

      // ── GESCHIEDENIS ──────────────────────────────────────
      const historyUsers = Object.entries(grouped).filter(([, recs]) =>
        recs.some((c) => c.week_start !== thisWeek)
      );

      if (historyUsers.length) {
        html += `<p style="font-size:0.75rem;color:#555;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin:0 0 12px;">Geschiedenis</p>`;

        historyUsers.forEach(([userId, records]) => {
          const history = records.filter((c) => c.week_start !== thisWeek);
          const name = profileMap[userId] || userId;
          const safeId = 'h' + userId.replace(/[^a-z0-9]/gi, '');

          html += `
            <div style="border:1px solid #1A1A1A;border-radius:12px;overflow:hidden;margin-bottom:10px;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:#0D0D0D;user-select:none;"
                   onclick="var el=document.getElementById('${safeId}');el.classList.toggle('hidden');">
                <strong style="font-size:0.9rem;">${escapeHtml(name)}</strong>
                <span style="font-size:0.75rem;color:#555;">${history.length} ${history.length === 1 ? 'week' : 'weken'} &nbsp;▾</span>
              </div>
              <div id="${safeId}" class="hidden">`;

          history.forEach((c) => {
            const dateStr = new Date(c.week_start + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
            const detId = safeId + c.week_start.replace(/-/g, '');
            html += `
              <div style="border-top:1px solid #1A1A1A;">
                <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;"
                     onclick="document.getElementById('${detId}').classList.toggle('hidden')">
                  <span style="font-size:0.82rem;color:#888;flex:1;">Week van ${dateStr}</span>
                  <span style="font-size:0.75rem;color:#555;">${c.overall_rating != null ? c.overall_rating + ' overall' : '—'} &nbsp;▾</span>
                </div>
                <div id="${detId}" class="hidden" style="padding:0 16px 14px;">
                  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;">
                    ${adminRating('Overall', c.overall_rating)}
                    ${adminRating('Ment. T', c.mental_training)}
                    ${adminRating('Ment. W', c.mental_matches)}
                    ${adminRating('Energie', c.energy_level)}
                    ${adminRating('Slaap', c.sleep_recovery)}
                  </div>
                  <div style="font-size:0.75rem;color:#555;margin-bottom:6px;">${c.training_sessions ?? 0} trainingen</div>
                  ${c.went_well ? `<p style="font-size:0.82rem;color:#888;margin-top:4px;line-height:1.5;"><span style="color:#666;font-weight:600;">Goed: </span>${escapeHtml(c.went_well)}</p>` : ''}
                  ${c.was_challenging ? `<p style="font-size:0.82rem;color:#888;margin-top:4px;line-height:1.5;"><span style="color:#666;font-weight:600;">Uitdagend: </span>${escapeHtml(c.was_challenging)}</p>` : ''}
                  ${c.focus_next_week ? `<p style="font-size:0.82rem;color:#888;margin-top:4px;line-height:1.5;"><span style="color:#666;font-weight:600;">Focus: </span>${escapeHtml(c.focus_next_week)}</p>` : ''}
                </div>
              </div>`;
          });

          html += `</div></div>`;
        });
      }

      overview.innerHTML = html;
    }

    const ASSIGNMENTS_ADMIN = [
      { num:1, title:'Wie ben jij als sporter?' },
      { num:2, title:'Je beste moment' },
      { num:3, title:'Wat kost je energie?' },
      { num:4, title:'Hoe praat jij tegen jezelf?' },
      { num:5, title:'Omgaan met fouten' },
      { num:6, title:'Druk en spanning' },
      { num:7, title:'Jouw voorbereiding' },
      { num:8, title:'Jouw krachten' },
      { num:9, title:'Concentratie' },
      { num:10, title:'Doelen stellen' },
      { num:11, title:'Jouw ideale mindset' },
      { num:12, title:'Brief aan jezelf' },
    ];

    async function loadOpdrachtenOverview() {
      const overview = document.getElementById('opdrachtenOverview');
      overview.innerHTML = '<div class="empty-state">Laden…</div>';

      const [{ data: completions }, { data: profiles }] = await Promise.all([
        supabaseClient.from('assignment_completions').select('*').order('assignment_num', { ascending: true }),
        supabaseClient.from('profiles').select('id, full_name'),
      ]);

      if (!completions || !completions.length) {
        overview.innerHTML = '<div class="empty-state">Nog geen opdrachten ingeleverd.</div>';
        return;
      }

      const profileMap = {};
      (profiles || []).forEach((p) => { profileMap[p.id] = p.full_name || p.id; });

      const grouped = {};
      completions.forEach((c) => {
        if (!grouped[c.user_id]) grouped[c.user_id] = [];
        grouped[c.user_id].push(c);
      });

      overview.innerHTML = Object.entries(grouped).map(([userId, recs]) => {
        const total = ASSIGNMENTS_ADMIN.length;
        const pct = Math.round((recs.length / total) * 100);

        const items = recs.map((c) => {
          const a = ASSIGNMENTS_ADMIN.find((x) => x.num === c.assignment_num);
          const dateStr = new Date(c.created_at).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
          return `
            <div style="border:1px solid #1A1A1A;border-radius:8px;overflow:hidden;margin-bottom:8px;">
              <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:#0D0D0D;"
                   onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                <span style="background:rgba(200,241,53,.1);border:1px solid rgba(200,241,53,.2);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#C8F135;flex-shrink:0;">✓</span>
                <span style="flex:1;font-size:0.86rem;color:#888;">${c.assignment_num}. ${escapeHtml(a ? a.title : '')}</span>
                <span style="font-size:0.7rem;color:#444;">${dateStr}</span>
              </div>
              <div style="display:none;padding:12px 14px;font-size:0.87rem;color:#666;line-height:1.75;white-space:pre-line;border-top:1px solid #1A1A1A;">${escapeHtml(c.response)}</div>
            </div>
          `;
        }).join('');

        return `
          <div class="card" style="margin-bottom:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <h3>${escapeHtml(profileMap[userId] || userId)}</h3>
              <span style="font-size:0.78rem;color:#555;">${recs.length} / ${total} voltooid</span>
            </div>
            <div style="background:#1A1A1A;border-radius:999px;height:4px;overflow:hidden;margin-bottom:14px;">
              <div style="height:100%;background:#C8F135;border-radius:999px;width:${pct}%;"></div>
            </div>
            ${items}
          </div>
        `;
      }).join('');
    }

    async function loadPlanningOverview() {
      const overview = document.getElementById('planningOverview');
      overview.innerHTML = '<div class="empty-state">Laden…</div>';

      const [{ data: tournaments }, { data: profiles }] = await Promise.all([
        supabaseClient.from('tournaments').select('*').order('start_date', { ascending: true }),
        supabaseClient.from('profiles').select('id, full_name'),
      ]);

      if (!tournaments || !tournaments.length) {
        overview.innerHTML = '<div class="empty-state">Nog geen toernooien ingepland.</div>';
        return;
      }

      const profileMap = {};
      (profiles || []).forEach((p) => { profileMap[p.id] = p.full_name || p.id; });

      const grouped = {};
      tournaments.forEach((t) => {
        if (!grouped[t.user_id]) grouped[t.user_id] = [];
        grouped[t.user_id].push(t);
      });

      const surfaceColors = { hard: '#3b82f6', gravel: '#d97706', grass: '#16a34a', indoor: '#7c3aed' };
      const surfaceLabels = { hard: 'Hard', gravel: 'Gravel', grass: 'Gras', indoor: 'Indoor' };

      overview.innerHTML = Object.entries(grouped).map(([userId, recs]) => `
        <div class="card" style="margin-bottom: 16px;">
          <h3 style="margin-bottom: 14px;">${escapeHtml(profileMap[userId] || userId)}</h3>
          ${recs.map((t) => `
            <div class="content-item" style="margin-bottom: 10px; padding: 12px 14px;">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <strong>${escapeHtml(t.name)}</strong>
                ${t.surface ? `<span style="background:${surfaceColors[t.surface]||'#333'};color:#fff;border-radius:4px;padding:2px 8px;font-size:0.68rem;font-weight:700;">${escapeHtml(surfaceLabels[t.surface]||t.surface)}</span>` : ''}
              </div>
              <div class="muted" style="font-size:0.8rem;margin-top:5px;">
                ${escapeHtml(t.start_date)}${t.end_date ? ' t/m ' + escapeHtml(t.end_date) : ''}
                ${t.location ? ' · ' + escapeHtml(t.location) : ''}
              </div>
              ${t.notes ? `<p class="muted" style="font-size:0.82rem;margin-top:5px;">${escapeHtml(t.notes)}</p>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function loadVideoOverview() {
      const overview = document.getElementById('videoOverview');
      overview.innerHTML = '<div class="empty-state">Laden…</div>';

      const [{ data: videos }, { data: profiles }] = await Promise.all([
        supabaseClient.from('video_submissions').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('profiles').select('id, full_name'),
      ]);

      if (!videos || !videos.length) {
        overview.innerHTML = '<div class="empty-state">Nog geen video\'s ingediend.</div>';
        return;
      }

      const profileMap = {};
      (profiles || []).forEach((p) => { profileMap[p.id] = p.full_name || p.id; });

      const typeColors = { training: '#3b82f6', wedstrijd: '#d97706' };
      const typeLabels = { training: 'Training', wedstrijd: 'Wedstrijd' };

      const withUrls = await Promise.all(videos.map(async (v) => {
        let viewUrl = null;
        if (v.storage_path) {
          const { data } = await supabaseClient.storage
            .from('player-videos')
            .createSignedUrl(v.storage_path, 86400);
          viewUrl = data?.signedUrl || null;
        } else if (v.video_url && v.video_url.startsWith('http')) {
          viewUrl = v.video_url;
        }
        return { ...v, viewUrl };
      }));

      overview.innerHTML = withUrls.map((v) => `
        <div class="card" style="margin-bottom: 14px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;">
            <strong>${escapeHtml(v.title)}</strong>
            ${v.video_type ? `<span style="background:${typeColors[v.video_type]||'#333'};color:#fff;border-radius:4px;padding:2px 8px;font-size:0.68rem;font-weight:700;">${escapeHtml(typeLabels[v.video_type]||v.video_type)}</span>` : ''}
            ${v.feedback ? '<span style="background:rgba(200,241,53,.15);color:#C8F135;border:1px solid rgba(200,241,53,.25);border-radius:999px;padding:2px 10px;font-size:0.68rem;font-weight:700;">✓ Feedback gegeven</span>' : '<span style="background:#1A1A1A;color:#555;border:1px solid #2A2A2A;border-radius:999px;padding:2px 10px;font-size:0.68rem;">Wacht op feedback</span>'}
          </div>
          <div class="muted" style="font-size:0.75rem;margin-bottom:8px;">
            ${escapeHtml(profileMap[v.user_id] || v.user_id)} · ${new Date(v.created_at).toLocaleDateString('nl-NL')}
          </div>
          ${v.description ? `<p class="muted" style="font-size:0.85rem;margin-bottom:10px;">${escapeHtml(v.description)}</p>` : ''}
          ${v.viewUrl
            ? `<a href="${escapeHtml(v.viewUrl)}" target="_blank" rel="noopener" style="color:#C8F135;font-size:0.85rem;text-decoration:none;">Video bekijken →</a>`
            : `<span style="font-size:0.82rem;color:#555;">Geen link beschikbaar</span>`
          }

          <div style="margin-top:14px;">
            <label style="font-size:0.78rem;color:#666;display:block;margin-bottom:6px;">Feedback schrijven:</label>
            <textarea id="fb-${escapeAttr(v.id)}" style="min-height:80px;width:100%;background:#111;border:1px solid #2A2A2A;border-radius:8px;color:#DDD;padding:10px;font-family:Inter,sans-serif;font-size:0.87rem;resize:vertical;">${escapeHtml(v.feedback || '')}</textarea>
            <button class="btn btn-accent" style="margin-top:8px;width:100%;font-size:0.82rem;" onclick="saveFeedback('${escapeAttr(v.id)}')">Feedback opslaan</button>
            <p id="fbmsg-${escapeAttr(v.id)}" class="hidden" style="margin-top:6px;font-size:0.8rem;"></p>
          </div>
        </div>
      `).join('');
    }

    async function saveFeedback(videoId) {
      const textarea = document.getElementById('fb-' + videoId);
      const msgEl = document.getElementById('fbmsg-' + videoId);
      const feedback = textarea.value.trim();

      const { error } = await supabaseClient
        .from('video_submissions')
        .update({ feedback: feedback || null })
        .eq('id', videoId);

      msgEl.classList.remove('hidden');
      if (error) {
        msgEl.style.color = '#EE4444';
        msgEl.textContent = 'Opslaan mislukt: ' + error.message;
      } else {
        msgEl.style.color = '#6BCB2E';
        msgEl.textContent = 'Feedback opgeslagen.';
        setTimeout(() => msgEl.classList.add('hidden'), 3000);
      }
    }

    function adminRating(label, value) {
      if (value == null) return `<div style="background:#0D0D0D;border:1px solid #222;border-radius:6px;padding:6px 8px;text-align:center;"><div style="font-size:0.65rem;color:#444;">${label}</div><div style="font-size:1rem;color:#333;margin-top:2px;">—</div></div>`;
      const color = value >= 8 ? '#6BCB2E' : value >= 6 ? '#AACC44' : value >= 4 ? '#EEAA33' : '#EE4444';
      return `<div style="background:#0D0D0D;border:1px solid #222;border-radius:6px;padding:6px 8px;text-align:center;">
        <div style="font-size:0.65rem;color:#555;">${label}</div>
        <div style="font-size:1.1rem;font-weight:700;color:${color};margin-top:2px;">${value}</div>
      </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    (async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        location.href = 'login.html';
        return;
      }
      await checkAccess();
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
