<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portal · Van Sambeek Performance</title>
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="icon" href="assets/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3, .greeting {
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 0.05em;
    }

    .greeting {
      font-size: 2.2rem;
      color: #FFFFFF;
      margin: 0 0 4px;
    }

    .subgreeting {
      color: #888;
      font-size: 0.95rem;
      margin: 0 0 24px;
    }

    .app-topbar {
      background: #0A0A0A;
      border-bottom: 1px solid #1A1A1A;
    }

    .app-topbar .brand span {
      color: #FFFFFF;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 0.08em;
      font-size: 1.1rem;
    }

    .icon-btn {
      color: #FFFFFF;
      background: transparent;
    }

    .app-main {
      background: #0A0A0A;
    }

    .card {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h3 {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.3rem;
      letter-spacing: 0.05em;
      color: #FFFFFF;
      margin: 0 0 10px;
    }

    .muted {
      color: #888;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #1A1A1A;
      background: transparent;
      margin-bottom: 16px;
    }

    .tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 10px 16px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: #C8F135;
      border-bottom-color: #C8F135;
    }

    .bottom-nav {
      background: #0A0A0A;
      border-top: 1px solid #1A1A1A;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #555;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-btn svg {
      stroke: #555;
      transition: stroke 0.15s;
    }

    .nav-btn.active {
      color: #C8F135;
    }

    .nav-btn.active svg {
      stroke: #C8F135;
    }

    .btn-accent {
      background: #C8F135;
      color: #0A0A0A;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-accent:hover {
      background: #d4f53f;
    }

    .btn-ghost {
      background: transparent;
      color: #FFFFFF;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      width: 100%;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
    }

    .btn.hidden {
      display: none !important;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      color: #AAA;
      font-size: 0.82rem;
      margin-bottom: 6px;
      font-family: 'Inter', sans-serif;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: #111;
      color: #FFF;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    .field textarea {
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #555;
    }

    .content-item {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .content-item strong {
      color: #FFF;
    }

    .empty-state {
      color: #444;
      text-align: center;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    a {
      color: #C8F135;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #matchMessage.success-msg {
      color: #C8F135;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    #matchMessage.error-msg {
      color: #ff4444;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    .btn-ghost-sm {
      background: transparent;
      color: #AAA;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .btn-ghost-sm:hover {
      color: #FFF;
      border-color: #555;
    }
  </style>
</head>
<body>

  <div id="app" class="hidden">
    <header class="app-topbar">
      <div class="brand">
        <img src="assets/logo.png" alt="" />
        <span id="topbarTitle">Home</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <a id="adminBtn" href="admin.html" class="btn-ghost-sm hidden">Beheer</a>
        <button class="icon-btn" id="logoutBtn" title="Uitloggen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <section class="screen active" id="screen-home">
        <p class="greeting" id="homeGreeting">Hoi</p>
        <p class="subgreeting">Fijn dat je er bent.</p>

        <div class="card" id="tipCard">
          <h3>Tip van de dag</h3>
          <p class="muted" id="tipBody">Tip laden…</p>
        </div>
      </section>

      <section class="screen" id="screen-library">
        <div class="tabs" id="categoryTabs">
          <button class="tab active" data-category="mentaal">Mentaal</button>
          <button class="tab" data-category="mindfulness">Mindfulness</button>
          <button class="tab" data-category="voeding">Voeding</button>
          <button class="tab" data-category="fysiek">Fysiek</button>
        </div>
        <div id="libraryList"></div>
      </section>

      <section class="screen" id="screen-wedstrijden">
        <div class="card">
          <h3>Wedstrijdreflectie</h3>
          <form id="matchForm">
            <div class="field">
              <label>Datum</label>
              <input type="date" id="matchDatum" required />
            </div>
            <div class="field">
              <label>Tegenstander</label>
              <input type="text" id="matchTegenstander" required placeholder="Naam tegenstander" />
            </div>
            <div class="field">
              <label>Score</label>
              <input type="text" id="matchScore" placeholder="bijv. 6-3 6-4" />
            </div>
            <div class="field">
              <label>Wat heb ik vandaag goed gedaan?</label>
              <textarea id="matchVraag1" required style="min-height: 80px;"></textarea>
            </div>
            <div class="field">
              <label>Wat zou ik de volgende keer beter willen doen?</label>
              <textarea id="matchVraag2" required style="min-height: 80px;"></textarea>
            </div>
            <div class="field">
              <label>Hoe kan ik ervoor zorgen dat ik dit ga verbeteren?</label>
              <textarea id="matchVraag3" required style="min-height: 80px;"></textarea>
            </div>
            <button type="submit" class="btn-accent">Opslaan</button>
            <p id="matchMessage" class="hidden"></p>
          </form>
        </div>

        <h3 style="margin: 24px 0 12px;">Eerder ingevulde reflecties</h3>
        <div id="matchList"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Home
      </button>
      <button class="nav-btn" data-screen="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M4 4h11a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/><path d="M18 4v16"/></svg>
        Content
      </button>
      <button class="nav-btn" data-screen="wedstrijden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        Wedstrijden
      </button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase-config.js"></script>
  <script>
    const titles = { home: 'Home', library: 'Content', wedstrijden: 'Wedstrijden' };

    let currentUser = null;
    let libraryLoaded = false;

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      location.href = 'login.html';
    });

    document.querySelectorAll('.bottom-nav .nav-btn').forEach((btn) => {
      btn.addEventListener('click', () => switchScreen(btn.dataset.screen));
    });

    document.querySelectorAll('#categoryTabs .tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#categoryTabs .tab').forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        loadLibrary(tab.dataset.category);
      });
    });

    document.getElementById('matchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById('matchMessage');
      const payload = {
        user_id: currentUser.id,
        datum: document.getElementById('matchDatum').value,
        tegenstander: document.getElementById('matchTegenstander').value.trim(),
        score: document.getElementById('matchScore').value.trim() || null,
        vraag1: document.getElementById('matchVraag1').value.trim(),
        vraag2: document.getElementById('matchVraag2').value.trim(),
        vraag3: document.getElementById('matchVraag3').value.trim(),
      };

      const { error } = await supabaseClient.from('match_reflections').insert(payload);
      messageEl.classList.remove('hidden', 'error-msg', 'success-msg');

      if (error) {
        messageEl.classList.add('error-msg');
        messageEl.textContent = 'Opslaan mislukt: ' + error.message;
        return;
      }

      messageEl.classList.add('success-msg');
      messageEl.textContent = 'Reflectie opgeslagen.';
      document.getElementById('matchForm').reset();
      loadMatchReflections();
    });

    function switchScreen(name) {
      document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach((b) => b.classList.toggle('active', b.dataset.screen === name));
      document.getElementById('topbarTitle').textContent = titles[name];

      if (name === 'library' && !libraryLoaded) {
        const activeCategory = document.querySelector('#categoryTabs .tab.active').dataset.category;
        loadLibrary(activeCategory);
      }
      if (name === 'wedstrijden') {
        loadMatchReflections();
      }
    }

    async function onAuthenticated() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      currentUser = user;
      document.getElementById('app').classList.remove('hidden');

      const { data: profile } = await supabaseClient.from('profiles').select('is_admin').eq('id', user.id).single();
      document.getElementById('adminBtn').classList.toggle('hidden', !(profile && profile.is_admin));

      loadHome();
    }

    async function loadHome() {
      const name = currentUser?.user_metadata?.full_name || currentUser?.email?.split('@')[0] || 'sporter';
      document.getElementById('homeGreeting').textContent = `Hoi ${name}`;

      const { data: tips } = await supabaseClient
        .from('content_items')
        .select('title, description')
        .eq('published', true)
        .order('created_at', { ascending: false })
        .limit(20);

      if (tips && tips.length) {
        const tip = tips[Math.floor(Math.random() * tips.length)];
        document.getElementById('tipBody').textContent = `${tip.title}${tip.description ? ' — ' + tip.description : ''}`;
      } else {
        document.getElementById('tipBody').textContent = 'Nog geen content beschikbaar.';
      }
    }

    async function loadLibrary(category) {
      libraryLoaded = true;
      const list = document.getElementById('libraryList');
      list.innerHTML = `<div class="empty-state">Laden…</div>`;

      const { data, error } = await supabaseClient
        .from('content_items')
        .select('*')
        .eq('category', category)
        .eq('published', true)
        .order('sort_order', { ascending: true });

      if (error || !data || !data.length) {
        list.innerHTML = `<div class="empty-state">Nog geen content in deze categorie.</div>`;
        return;
      }

      list.innerHTML = data.map((item) => `
        <div class="content-item">
          <strong>${escapeHtml(item.title)}</strong>
          <p class="muted" style="margin-top:6px;">${escapeHtml(item.description || '')}</p>
          ${item.video_url ? `<p style="margin-top:10px;"><a href="${escapeAttr(item.video_url)}" target="_blank" rel="noopener">Openen →</a></p>` : ''}
        </div>
      `).join('');
    }

    async function loadMatchReflections() {
      const list = document.getElementById('matchList');
      list.innerHTML = '<div class="empty-state">Laden…</div>';

      const { data, error } = await supabaseClient
        .from('match_reflections')
        .select('*')
        .order('datum', { ascending: false });

      if (error || !data || !data.length) {
        list.innerHTML = '<div class="empty-state">Nog geen wedstrijdreflecties.</div>';
        return;
      }

      list.innerHTML = data.map((r) => `
        <div class="content-item">
          <strong>${escapeHtml(r.tegenstander)}</strong>
          <span class="muted"> · ${escapeHtml(r.datum)}${r.score ? ' · ' + escapeHtml(r.score) : ''}</span>
          <p class="muted" style="margin-top:10px;"><strong style="color:#AAA;">Wat ging goed:</strong><br>${escapeHtml(r.vraag1)}</p>
          <p class="muted" style="margin-top:8px;"><strong style="color:#AAA;">Verbeteren:</strong><br>${escapeHtml(r.vraag2)}</p>
          <p class="muted" style="margin-top:8px;"><strong style="color:#AAA;">Aanpak:</strong><br>${escapeHtml(r.vraag3)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return (str ?? '').replace(/"/g, '&quot;');
    }

    (async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        location.href = 'login.html';
        return;
      }
      await onAuthenticated();
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
